<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Learning Playground</title>
  </head>
  <body>
    <script>
      const repoBase = '/My-Learning-Playground';
      const route = location.pathname.startsWith(repoBase)
        ? location.pathname.slice(repoBase.length)
        : location.pathname;
      location.replace(`${repoBase}/?route=${encodeURIComponent(route || '/1')}`);
    </script>
  </body>
</html>
