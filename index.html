<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A local-first study playground for CRUD, implementation interviews, and system design basics."
    />
    <title>My Learning Playground</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const isGitHubPages = window.location.hostname.endsWith('github.io');
      const basePath = isGitHubPages ? '/My-Learning-Playground/' : '/';

      function loadBuiltApp() {
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = `${basePath}assets/app.css`;
        document.head.appendChild(stylesheet);

        const script = document.createElement('script');
        script.type = 'module';
        script.src = `${basePath}assets/app.js`;
        document.body.appendChild(script);
      }

      function loadDevApp() {
        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/src/main.tsx';
        document.body.appendChild(script);
      }

      if (isGitHubPages) {
        loadBuiltApp();
      } else {
        fetch('/src/main.tsx', { method: 'HEAD' })
          .then((response) => {
            if (response.ok) {
              loadDevApp();
            } else {
              loadBuiltApp();
            }
          })
          .catch(loadBuiltApp);
      }
    </script>
  </body>
</html>
